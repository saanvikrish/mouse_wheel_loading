    <title>Mouse Loading Animation</title>
    <style>
:root {
  color-scheme: dark;
  --bg: #050a0d;
  --grid: rgba(170, 215, 226, 0.07);
  --grid-soft: rgba(170, 215, 226, 0.028);
}

* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  min-height: 100%;
  margin: 0;
}

body {
  min-height: 100vh;
  overflow: hidden;
  background:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px),
    linear-gradient(var(--grid-soft) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-soft) 1px, transparent 1px),
    radial-gradient(circle at 50% 45%, rgba(45, 70, 78, 0.28), transparent 46%),
    var(--bg);
  background-size: 64px 64px, 64px 64px, 16px 16px, 16px 16px, 100% 100%, 100% 100%;
}

.screen {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 32px;
}

.loader-shell {
  width: min(390px, calc(100vw - 40px));
  display: grid;
  justify-items: center;
}

.progress-panel {
  width: 100%;
  margin-top: 16px;
}

.progress-copy {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 18px;
  align-items: baseline;
  margin-bottom: 16px;
}

.label,
.percent {
  margin: 0;
  color: rgba(255, 255, 255, 0.88);
  font-family: "SFMono-Regular", "Consolas", "Liberation Mono", monospace;
  font-size: clamp(11px, 1.05vw, 14px);
  font-weight: 400;
  letter-spacing: 0.2em;
  line-height: 1;
  text-shadow: 0 0 10px rgba(255, 255, 255, 0.16);
  white-space: nowrap;
}

.percent {
  min-width: 5ch;
  text-align: right;
  letter-spacing: 0.12em;
}

.track {
  width: 100%;
  height: 4px;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.16);
}

.fill {
  display: block;
  width: 100%;
  height: 100%;
  border-radius: inherit;
  background: rgba(255, 255, 255, 0.94);
  box-shadow: 0 0 12px rgba(255, 255, 255, 0.22);
  transform: scaleX(0);
  transform-origin: left center;
  will-change: transform;
}

@keyframes runMouse {
  to {
    background-position: -1050px 0;
  }
}

@media (max-width: 560px) {
  .screen {
    padding: 28px 18px;
  }

  .loading-frame {
    width: 220px;
    height: 229px;
    background-size: 1100px 317.778px;
  }

  @keyframes runMouse {
    to {
      background-position: -1100px 0;
    }
  }

  .progress-panel {
    margin-top: 18px;
  }

  .label,
  .percent {
    font-size: 12px;
    letter-spacing: 0.12em;
  }
}

</style>
  </head>
  <body>
    <main class="screen" aria-label="Loading memory mission">
      <section class="loader-shell">
        <div class="loading-frame" role="img" aria-label="Animated mouse wheel"></div>

        <div class="progress-panel">
          <div class="progress-copy">
            <p class="label">LOADING MEMORY MISSION</p>
            <p class="percent" id="percent">0%</p>
          </div>
          <div class="track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <span class="fill" id="progressFill"></span>
          </div>
        </div>
      </section>
    </main>
    <script>
const progressFill = document.querySelector("#progressFill");
const percentText = document.querySelector("#percent");
const progressbar = document.querySelector(".track");

const duration = 8200;
const completeHold = 450;
let startTime = performance.now();

function updateProgress(now) {
  const elapsed = (now - startTime) % (duration + completeHold);
  const progress = elapsed >= duration ? 1 : elapsed / duration;
  const percent = Math.floor(progress * 100);

  progressFill.style.transform = `scaleX(${progress.toFixed(4)})`;
  percentText.textContent = `${percent}%`;
  progressbar.setAttribute("aria-valuenow", String(percent));

  requestAnimationFrame(updateProgress);
}

requestAnimationFrame(updateProgress);

</script>
  </body>
