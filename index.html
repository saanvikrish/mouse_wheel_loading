<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mouse Loading Animation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="screen" aria-label="Loading memory mission">
      <section class="loader-shell">
        <div class="loading-frame" role="img" aria-label="Animated mouse wheel"></div>

        <div class="progress-panel">
          <div class="progress-copy">
            <p class="label">LOADING MEMORY MISSION</p>
            <p class="percent" id="percent">0%</p>
          </div>
          <div class="track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <span class="fill" id="progressFill"></span>
          </div>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
